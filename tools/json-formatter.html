        }

        .editor-grid {
            display: grid;

        textarea {

        textarea:focus {
            outline: none;
            border-color: var(--accent);

        textarea::placeholder { color: var(--text-muted); }

            margin-top: 16px;

        .status.error {
            display: block;
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);

        .options-row {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        .option-group {
            display: flex;
            align-items: center;
            gap: 8px;

        .option-group label {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin: 0;
        }

        select {
            background: var(--bg-secondary);
            border: 1px solid var(--border-light);
            border-radius: 6px;
            padding: 8px 12px;
            color: var(--text-primary);
            font-size: 0.9rem;
            cursor: pointer;
        }

        select:focus { outline: none; border-color: var(--accent); }

        .btn-row {
            display: flex;
            gap: 12px;
            margin-top: 24px;
            flex-wrap: wrap;

        .btn {
            background: var(--accent);

<body>
    <div class="gradient-bg"></div>

    <nav class="nav">
        <div class="nav-inner">
            <a href="../" class="logo">
                <div class="logo-icon">T</div>
                ToolsForge
            </a>
            <ul class="nav-links">
                <li><a href="../">All Tools</a></li>
                <li><a href="https://kaiprompts.com" target="_blank">Kai Prompts</a></li>
            </ul>
        </div>
    </nav>

    <div class="container">
        <div class="page-header">
            <a href="../" class="back-link">&larr; All Tools</a>
            <h1>JSON Formatter & Validator</h1>
            <p>Beautify, minify, and validate JSON data instantly</p>
        </div>

        <div class="ad-placeholder">Advertisement</div>

        <div class="tool-card">
            <div class="editor-grid">
                <div class="editor-panel">
                    <label>Input JSON</label>
                    <textarea id="jsonInput" placeholder='Paste your JSON here...

Example:
{"name":"John","age":30,"city":"New York"}'></textarea>
                </div>
                <div class="editor-panel">
                    <label>Output</label>
                    <textarea id="jsonOutput" readonly placeholder="Formatted JSON will appear here..."></textarea>
                </div>
            </div>

            <div id="status" class="status"></div>

            <div class="options-row">
                <div class="option-group">
                    <label for="indentSize">Indent:</label>
                    <select id="indentSize">
                        <option value="2">2 spaces</option>
                        <option value="4">4 spaces</option>
                        <option value="tab">Tab</option>
                    </select>
                </div>
            </div>

            <div class="btn-row">
                <button class="btn" onclick="formatJSON()">Format / Beautify</button>
                <button class="btn btn-green" onclick="minifyJSON()">Minify</button>
                <button class="btn btn-secondary" onclick="validateJSON()">Validate Only</button>
                <button class="btn btn-secondary" onclick="copyOutput()">Copy Output</button>
                <button class="btn btn-secondary" onclick="clearAll()">Clear</button>
            </div>
        </div>

        <div class="ad-placeholder">Advertisement</div>
    </div>

    <footer class="footer">
        <div class="footer-inner">
            <div class="footer-links">
                <a href="../">All Tools</a>
                <a href="word-counter.html">Word Counter</a>
                <a href="password-generator.html">Password Generator</a>
                <a href="https://kaiprompts.com" target="_blank">Kai Prompts</a>
            </div>
            <p>&copy; 2026 ToolsForge. A <a href="https://kaiprompts.com" target="_blank">kaiprompts.com</a> project.</p>
        </div>
    </footer>

    <script>
        const jsonInput = document.getElementById('jsonInput');
        const jsonOutput = document.getElementById('jsonOutput');
        const statusEl = document.getElementById('status');
        const indentSize = document.getElementById('indentSize');

        function showStatus(message, isError = false) {
            statusEl.textContent = message;
            statusEl.className = 'status ' + (isError ? 'error' : 'success');
        }

        function hideStatus() {
            statusEl.className = 'status';
        }

        function getIndent() {
            const value = indentSize.value;
            if (value === 'tab') return '\t';
            return parseInt(value);
        }

        function formatJSON() {
            const input = jsonInput.value.trim();
            if (!input) {
                showStatus('Please enter some JSON to format.', true);
                return;
            }

            try {
                const parsed = JSON.parse(input);
                const formatted = JSON.stringify(parsed, null, getIndent());
                jsonOutput.value = formatted;
                showStatus('Valid JSON - formatted successfully!');
            } catch (e) {
                jsonOutput.value = '';
                showStatus('Invalid JSON: ' + e.message, true);
            }
        }

        function minifyJSON() {
            const input = jsonInput.value.trim();
            if (!input) {
                showStatus('Please enter some JSON to minify.', true);
                return;
            }

            try {
                const parsed = JSON.parse(input);
                const minified = JSON.stringify(parsed);
                jsonOutput.value = minified;
                showStatus('Valid JSON - minified! (' + minified.length + ' characters)');
            } catch (e) {
                jsonOutput.value = '';
                showStatus('Invalid JSON: ' + e.message, true);
            }
        }

        function validateJSON() {
            const input = jsonInput.value.trim();
            if (!input) {
                showStatus('Please enter some JSON to validate.', true);
                return;
            }

            try {
                JSON.parse(input);
                showStatus('Valid JSON!');
            } catch (e) {
                showStatus('Invalid JSON: ' + e.message, true);
            }
        }

        function copyOutput() {
            const output = jsonOutput.value;
            if (!output) {
                showStatus('Nothing to copy. Format some JSON first.', true);
                return;
            }

            navigator.clipboard.writeText(output).then(() => {
                showStatus('Copied to clipboard!');
            });
        }

        function clearAll() {
            jsonInput.value = '';
            jsonOutput.value = '';
            hideStatus();
        }

        jsonInput.addEventListener('paste', () => {
            setTimeout(() => {
                if (jsonInput.value.trim()) formatJSON();
            }, 100);
        });
    </script>
